name: "💡 功能建议 / Feature Request"
description: 想要新功能或改进现有体验 / Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决什么问题 / What problem does this solve
      description: 从你的使用场景说起，而不是直接说方案
      placeholder: 例：我在选课时想快速对比两门等同课的评价，但现在要来回切页面
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 建议的做法 / Proposed solution
      description: 你觉得可以怎么做（可选，没想法留空也行）
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / Alternatives considered
      description: 现在你是怎么绕过这个问题的？（可选）
